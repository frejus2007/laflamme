<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Joueurs - Admin</title>
    <script>
        if (!localStorage.getItem('flamme_admin')) {
            window.location.href = 'login.html';
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background-color: #111;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 250px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            color: var(--flame-orange);
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: var(--glow-orange);
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu a {
            display: block;
            padding: 15px 25px;
            color: #aaa;
            text-decoration: none;
            transition: 0.3s;
            border-left: 3px solid transparent;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(255, 115, 0, 0.1);
            color: #fff;
            border-left-color: var(--flame-orange);
        }

        .admin-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .admin-header h1 {
            font-size: 2rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
        }

        .admin-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            border-top: 3px solid var(--flame-orange);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .admin-table th {
            background: #222;
            color: var(--flame-yellow);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 15px;
            border-bottom: 2px solid #333;
        }

        .admin-table td {
            padding: 15px;
            vertical-align: middle;
            border-bottom: 1px solid #222;
        }

        .admin-table tbody tr:hover {
            background: rgba(255, 115, 0, 0.05);
        }

        .action-flex {
            display: flex;
            gap: 8px;
            justify-content: flex-start;
        }

        .btn-action {
            padding: 8px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            border: 1px solid transparent;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-penalize {
            background: rgba(204, 170, 0, 0.2);
            color: #ffcc00;
            border-color: #ffcc00;
        }
        .btn-penalize:hover {
            background: #ffcc00;
            color: #000;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        .btn-delete {
            background: rgba(255, 51, 51, 0.2);
            color: #ff3333;
            border-color: #ff3333;
        }
        .btn-delete:hover {
            background: #ff3333;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }

        .player-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #333;
            border: 1px solid var(--flame-orange);
            object-fit: cover;
        }

        .player-info-cell {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 2px solid var(--flame-orange);
                padding: 10px 0;
            }
            .sidebar-menu {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }
            .sidebar-menu li {
                flex: 1 1 auto;
                min-width: 120px;
            }
            .sidebar-menu a {
                padding: 10px;
                text-align: center;
                border-left: none;
                border-bottom: 3px solid transparent;
            }
            .sidebar-menu a:hover,
            .sidebar-menu a.active {
                border-left: none;
                border-bottom-color: var(--flame-orange);
            }
            .admin-content {
                padding: 20px 10px;
            }
            .admin-header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            .admin-card {
                padding: 15px;
            }
            .sidebar-brand {
                margin-bottom: 15px;
            }
            /* Table responsiveness is handled by .table-responsive wrapping the table */
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <a href="index.html" class="sidebar-brand">🔥 ADMIN</a>
            <ul class="sidebar-menu">
                <li><a href="index.html">Ajouter un Match</a></li>
                <li><a href="joueurs.html" class="active">Gestion Joueurs</a></li>
                <li><a href="saisons.html">Gestion Saisons</a></li>
                <li><a href="tournois.html">Gestion Tournois</a></li>
            </ul>
            <div style="margin-top: auto; padding: 20px;">
                <button onclick="logoutAdmin()" class="btn btn-outline"
                    style="width: 100%; border-color:#ff3333; color:#ff3333; background: transparent;">Déconnexion</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="admin-header">
                <h1>Gestion des Joueurs</h1>
            </div>

            <div class="admin-card">
                <div class="table-responsive">
                    <table class="gaming-table admin-table" style="font-size: 0.9rem;">
                        <thead>
                            <tr>
                                <th>Joueur / Pseudo</th>
                                <th>WhatsApp</th>
                                <th>Spécialité</th>
                                <th>Points</th>
                                <th>Actions Admin</th>
                            </tr>
                        </thead>
                        <tbody id="admin-players-body">
                            <!-- Players loaded dynamically -->
                            <tr>
                                <td colspan="5" style="text-align:center;">Chargement des joueurs...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script>
        function logoutAdmin() {
            localStorage.removeItem('flamme_admin');
            window.location.href = 'login.html';
        }
    </script>
    <script src="../js/supabase.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tbody = document.getElementById('admin-players-body');

            async function loadPlayers() {
                try {
                    if (!window.supabaseClient) throw new Error("Supabase non initialisé");

                    const { data, error } = await window.supabaseClient
                        .from('joueurs')
                        .select('*')
                        .order('points', { ascending: false });

                    if (error) throw error;

                    tbody.innerHTML = '';
                    if (!data || data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Aucun joueur trouvé</td></tr>';
                        return;
                    }

                    data.forEach(p => {
                        const defaultAvatar = 'https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Ghost&backgroundColor=000000';
                        const avatarUrl = p.avatar_url ? p.avatar_url : defaultAvatar;

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>
                                <a href="../profil.html?id=${p.id}" target="_blank" style="text-decoration:none;">
                                    <div class="player-info-cell">
                                        <img src="${avatarUrl}" alt="Avatar" class="player-avatar-small">
                                        <strong class="orbitron" style="color: #fff; transition: 0.3s;" onmouseover="this.style.color='var(--flame-orange)'" onmouseout="this.style.color='#fff'">${p.pseudo}</strong>
                                    </div>
                                </a>
                            </td>
                            <td style="color: #aaa;">${p.whatsapp}</td>
                            <td><span style="background: #222; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem;">${p.specialite}</span></td>
                            <td><strong style="color: var(--flame-orange); font-size: 1.1rem; font-family: 'Orbitron', sans-serif;">${p.points}</strong></td>
                            <td>
                                <div class="action-flex">
                                    <button class="btn-action btn-penalize" data-id="${p.id}" data-points="${p.points}" title="-20 pts changement spé">Changer Spé (-20)</button>
                                    <button class="btn-action btn-delete" data-id="${p.id}">Exclure</button>
                                </div>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });

                    // Attach events
                    document.querySelectorAll('.btn-delete').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            if (confirm("Supprimer ce joueur ?")) {
                                const id = e.target.getAttribute('data-id');
                                await window.supabaseClient.from('joueurs').delete().eq('id', id);
                                loadPlayers();
                            }
                        });
                    });

                    // Helper to compute grade
                    const computeGrade = (points) => {
                        if (points >= 1400) return 'Général';
                        if (points >= 950) return 'Commandant';
                        if (points >= 600) return 'Lieutenant';
                        if (points >= 300) return 'Sergent';
                        if (points >= 120) return 'Soldat';
                        return 'Recrue';
                    };

                    document.querySelectorAll('.btn-penalize').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const currentSpec = e.target.closest('tr').querySelector('td:nth-child(3) span').textContent;
                            const newSpecInput = prompt(`Nouvelle spécialité (saisissez 'BR' ou 'MJ'). Actuelle: ${currentSpec} :`);
                            if (!newSpecInput) return;
                            const newSpec = newSpecInput.toUpperCase();
                            if (newSpec !== 'BR' && newSpec !== 'MJ') {
                                alert("Spécialité invalide. L'opération est annulée.");
                                return;
                            }
                            if (newSpec === currentSpec) {
                                alert("C'est déjà sa spécialité actuelle !");
                                return;
                            }
                            
                            if (confirm(`Vous allez changer la spécialité en ${newSpec} et appliquer -20 points. Confirmer ?`)) {
                                const id = e.target.getAttribute('data-id');
                                const currentPts = parseInt(e.target.getAttribute('data-points'));
                                const newPtsNumerical = currentPts - 20;
                                const newPtsStr = newPtsNumerical.toString();
                                const newGrade = computeGrade(newPtsNumerical);
                                
                                try {
                                    const { error } = await window.supabaseClient.from('joueurs')
                                        .update({ points: newPtsStr, specialite: newSpec, grade: newGrade })
                                        .eq('id', id);
                                    if (error) throw error;
                                    loadPlayers();
                                    alert("Spécialité changée avec succès. -20 points appliqués.");
                                } catch (err) {
                                    console.error("Erreur màj:", err);
                                    alert("Erreur lors de la mise à jour.");
                                }
                            }
                        });
                    });

                } catch (err) {
                    console.error("Erreur", err);
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Erreur de chargement.</td></tr>';
                }
            }

            loadPlayers();
        });
    </script>
</body>

</html>

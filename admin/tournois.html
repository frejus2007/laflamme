<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Tournois - Admin</title>
    <script>
        if (!localStorage.getItem('flamme_admin')) {
            window.location.href = 'login.html';
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background-color: #111;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 250px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            color: var(--flame-orange);
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: var(--glow-orange);
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu a {
            display: block;
            padding: 15px 25px;
            color: #aaa;
            text-decoration: none;
            transition: 0.3s;
            border-left: 3px solid transparent;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(255, 115, 0, 0.1);
            color: #fff;
            border-left-color: var(--flame-orange);
        }

        .admin-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .admin-header h1 {
            font-size: 2rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
        }

        .admin-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            border-top: 3px solid var(--flame-orange);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .admin-table th {
            background: #222;
            color: var(--flame-yellow);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            padding: 15px;
            border-bottom: 2px solid #333;
        }

        .admin-table td {
            padding: 15px;
            vertical-align: middle;
            border-bottom: 1px solid #222;
        }

        .admin-table tbody tr:hover {
            background: rgba(255, 115, 0, 0.05);
        }

        .btn-delete {
            background: rgba(255, 51, 51, 0.2);
            color: #ff3333;
            border: 1px solid #ff3333;
            padding: 8px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ff3333;
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.5);
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
            }

            .admin-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 2px solid var(--flame-orange);
                padding: 10px 0;
            }

            .sidebar-menu {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }

            .sidebar-menu li {
                flex: 1 1 auto;
                min-width: 120px;
            }

            .sidebar-menu a {
                padding: 10px;
                text-align: center;
                border-left: none;
                border-bottom: 3px solid transparent;
            }

            .sidebar-menu a:hover,
            .sidebar-menu a.active {
                border-left: none;
                border-bottom-color: var(--flame-orange);
            }

            .admin-content {
                padding: 20px 10px;
            }

            .admin-header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }

            .admin-card {
                padding: 15px;
            }
            .form-grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <a href="index.html" class="sidebar-brand">🔥 ADMIN</a>
            <ul class="sidebar-menu">
                <li><a href="index.html">Ajouter un Match</a></li>
                <li><a href="joueurs.html">Gestion Joueurs</a></li>
                <li><a href="saisons.html">Gestion Saisons</a></li>
                <li><a href="tournois.html" class="active">Gestion Tournois</a></li>
            </ul>
            <div style="margin-top: auto; padding: 20px;">
                <button onclick="logoutAdmin()" class="btn btn-outline"
                    style="width: 100%; border-color:#ff3333; color:#ff3333; background: transparent;">Déconnexion</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="admin-header">
                <h1>Gestion des Tournois</h1>
            </div>

            <!-- Create Tournament Form -->
            <div class="admin-card">
                <h2 style="color: var(--flame-yellow); margin-bottom: 25px; font-size: 1.5rem; border-bottom: 1px solid #333; padding-bottom: 10px;">Créer un Tournoi</h2>
                <form id="create-tournoi-form">
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label>Nom du Tournoi</label>
                            <input type="text" id="t-nom" class="form-control" placeholder="Ex: Tournoi BR Duos" required>
                        </div>
                        <div class="form-group">
                            <label>Mode</label>
                            <input type="text" id="t-mode" class="form-control" placeholder="Ex: Battle Royale (Duos)" required>
                        </div>
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label>Date du Tournoi</label>
                            <input type="date" id="t-date" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Statut</label>
                            <select id="t-statut" class="form-control" required>
                                <option value="Ouvert">Ouvert</option>
                                <option value="En Cours">En Cours</option>
                                <option value="Terminé">Terminé</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Description (Optionnelle)</label>
                        <textarea id="t-desc" class="form-control" rows="2" placeholder="Brève description..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Récompense (Optionnelle)</label>
                        <input type="text" id="t-recompense" class="form-control" placeholder="Ex: Titre exclusif">
                    </div>

                    <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">CRÉER LE TOURNOI</button>
                    <div id="tournoi-msg" style="margin-top: 15px; text-align: center; display: none;"></div>
                </form>
            </div>

            <!-- Tournaments List -->
            <div class="admin-card">
                <h2 style="color: var(--flame-yellow); margin-bottom: 25px; font-size: 1.5rem; border-bottom: 1px solid #333; padding-bottom: 10px;">Liste des Tournois</h2>
                <div class="table-responsive">
                    <table class="gaming-table admin-table" style="font-size: 0.9rem;">
                        <thead>
                            <tr>
                                <th>Nom</th>
                                <th>Mode</th>
                                <th>Date</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-tournois-body">
                            <tr>
                                <td colspan="5" style="text-align:center;">Chargement des tournois...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        function logoutAdmin() {
            localStorage.removeItem('flamme_admin');
            window.location.href = 'login.html';
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tbody = document.getElementById('admin-tournois-body');
            const formObj = document.getElementById('create-tournoi-form');
            const msg = document.getElementById('tournoi-msg');

            async function loadTournois() {
                try {
                    if (!window.supabaseClient) throw new Error("Supabase non initialisé");

                    const { data, error } = await window.supabaseClient
                        .from('tournois')
                        .select('*')
                        .order('date_tournoi', { ascending: false });

                    if (error) throw error;

                    tbody.innerHTML = '';
                    if (!data || data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Aucun tournoi trouvé</td></tr>';
                        return;
                    }

                    data.forEach(t => {
                        let statusColor = t.statut === 'Ouvert' ? '#33ff33' : (t.statut === 'Terminé' ? '#ff3333' : '#aaa');
                        
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><strong style="color: #fff;">${t.nom}</strong></td>
                            <td style="color: #aaa;">${t.mode}</td>
                            <td>${new Date(t.date_tournoi).toLocaleDateString('fr-FR')}</td>
                            <td><span style="color: ${statusColor};">${t.statut}</span></td>
                            <td>
                                <button class="btn-delete" data-id="${t.id}">Supprimer</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });

                    // Attach delete events
                    document.querySelectorAll('.btn-delete').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            if (confirm("Supprimer ce tournoi définitivement ?")) {
                                const id = e.target.getAttribute('data-id');
                                await window.supabaseClient.from('tournois').delete().eq('id', id);
                                loadTournois(); // Reload list
                            }
                        });
                    });

                } catch (err) {
                    console.error("Erreur", err);
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Erreur de chargement.</td></tr>';
                }
            }

            // Load on init
            loadTournois();

            // Submit new tournoi
            formObj.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const nom = document.getElementById('t-nom').value;
                const mode = document.getElementById('t-mode').value;
                const dateT = document.getElementById('t-date').value;
                const statut = document.getElementById('t-statut').value;
                const desc = document.getElementById('t-desc').value;
                const recompense = document.getElementById('t-recompense').value;
                const btn = e.target.querySelector('button[type="submit"]');

                try {
                    btn.disabled = true;
                    btn.textContent = "CRÉATION EN COURS...";
                    msg.style.display = "none";

                    const { error } = await window.supabaseClient.from('tournois').insert([{
                        nom: nom,
                        mode: mode,
                        date_tournoi: dateT,
                        statut: statut,
                        description: desc,
                        recompense: recompense
                    }]);

                    if (error) throw error;

                    msg.textContent = "Tournoi créé avec succès !";
                    msg.style.color = "#33ff33";
                    msg.style.display = "block";
                    formObj.reset();
                    
                    // Reload list
                    loadTournois();

                } catch (err) {
                    console.error("Erreur création", err);
                    msg.textContent = "Erreur lors de la création du tournoi.";
                    msg.style.color = "#ff3333";
                    msg.style.display = "block";
                } finally {
                    btn.disabled = false;
                    btn.textContent = "CRÉER LE TOURNOI";
                }
            });
        });
    </script>
</body>

</html>

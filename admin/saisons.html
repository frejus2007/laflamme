<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Saisons - Admin</title>
    <script>
        if (!localStorage.getItem('flamme_admin')) {
            window.location.href = 'login.html';
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background-color: #111;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 250px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            color: var(--flame-orange);
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: var(--glow-orange);
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu a {
            display: block;
            padding: 15px 25px;
            color: #aaa;
            text-decoration: none;
            transition: 0.3s;
            border-left: 3px solid transparent;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(255, 115, 0, 0.1);
            color: #fff;
            border-left-color: var(--flame-orange);
        }

        .admin-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .admin-header h1 {
            font-size: 2rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
        }

        .admin-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            border-top: 3px solid var(--flame-orange);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 2px solid var(--flame-orange);
                padding: 10px 0;
            }
            .sidebar-menu {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }
            .sidebar-menu li {
                flex: 1 1 auto;
                min-width: 120px;
            }
            .sidebar-menu a {
                padding: 10px;
                text-align: center;
                border-left: none;
                border-bottom: 3px solid transparent;
            }
            .sidebar-menu a:hover,
            .sidebar-menu a.active {
                border-left: none;
                border-bottom-color: var(--flame-orange);
            }
            .admin-content {
                padding: 20px 10px;
            }
            .admin-header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            .admin-card {
                padding: 15px;
            }
            .sidebar-brand {
                margin-bottom: 15px;
            }
            .admin-table {
                font-size: 0.8rem;
            }
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .admin-table th {
            text-align: left;
            padding: 12px;
            background: #222;
            color: var(--flame-yellow);
            border-bottom: 2px solid #444;
        }

        .admin-table td {
            padding: 12px;
            border-bottom: 1px solid #333;
            color: #ccc;
        }

        .btn-action {
            padding: 5px 10px;
            font-size: 0.75rem;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid transparent;
            margin-right: 5px;
        }

        .btn-danger {
            background: rgba(255, 51, 51, 0.2);
            color: #ff3333;
            border-color: #ff3333;
        }

        .btn-warning {
            background: rgba(255, 170, 0, 0.2);
            color: #ffaa00;
            border-color: #ffaa00;
        }

        .btn-success {
            background: rgba(51, 255, 51, 0.2);
            color: #33ff33;
            border-color: #33ff33;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <a href="index.html" class="sidebar-brand">🔥 ADMIN</a>
            <ul class="sidebar-menu">
                <li><a href="index.html">Ajouter un Match</a></li>
                <li><a href="joueurs.html">Gestion Joueurs</a></li>
                <li><a href="saisons.html" class="active">Gestion Saisons</a></li>
                <li><a href="tournois.html">Gestion Tournois</a></li>
            </ul>
            <div style="margin-top: auto; padding: 20px;">
                <button onclick="logoutAdmin()" class="btn btn-outline"
                    style="width: 100%; border-color:#ff3333; color:#ff3333; background: transparent;">Déconnexion</button>
            </div>
        </aside>

        <main class="admin-content">
            <div class="admin-header">
                <h1>Gestion des Saisons</h1>
            </div>

            <div class="admin-card" style="max-width: 600px;">
                <h3 style="color: var(--flame-yellow); margin-bottom: 20px; font-size: 1.5rem; border-bottom: 1px solid #333; padding-bottom: 10px;">Saison Actuelle</h3>
                <div id="current-season-container"
                    style="background: rgba(0,0,0,0.5); padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 30px;">
                    <p style="font-size: 1.2rem; margin-bottom: 10px;"><strong id="current-season-name">Chargement...</strong></p>
                    <p style="color: #aaa;" id="current-season-start">Date de début: ...</p>
                    <p style="color: #aaa; margin-bottom: 20px;" id="current-season-end">Date de fin: ...</p>

                    <button id="btn-reset-season" class="btn btn-outline"
                        style="border-color:#ff3333; color:#ff3333; width:100%; transition: 0.3s; background: rgba(255,51,51,0.1);">Réinitialiser Points (Fin de
                        Saison)</button>
                </div>

                <h3 style="color: var(--flame-yellow); margin-bottom: 20px; font-size: 1.5rem; border-bottom: 1px solid #333; padding-bottom: 10px;">Créer Nouvelle Saison</h3>
                <form id="create-season-form">
                    <div class="form-group">
                        <label>Nom de la Saison</label>
                        <input type="text" id="new-season-name" class="form-control" placeholder="Ex: Saison 2 - Le Brasier" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>Date Début</label>
                            <input type="date" id="new-season-start" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Date Fin</label>
                            <input type="date" id="new-season-end" class="form-control" required>
                        </div>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">LANCER NOUVELLE SAISON</button>
                    <div id="season-msg" style="margin-top: 15px; text-align: center; display: none;"></div>
                </form>
            </div>

            <div class="admin-card" style="max-width: 900px;">
                <h3 style="color: var(--flame-yellow); margin-bottom: 20px; font-size: 1.5rem; border-bottom: 1px solid #333; padding-bottom: 10px;">Liste des Saisons</h3>
                <div style="overflow-x: auto;">
                    <table class="admin-table" id="seasons-table">
                        <thead>
                            <tr>
                                <th>Nom de la Saison</th>
                                <th>Début</th>
                                <th>Fin</th>
                                <th>Statut</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="seasons-tbody">
                            <tr>
                                <td colspan="5" style="text-align: center;">Chargement des saisons...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script>
        function logoutAdmin() {
            localStorage.removeItem('flamme_admin');
            window.location.href = 'login.html';
        }
    </script>
    <script src="../js/supabase.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            
            async function loadCurrentSeason() {
                try {
                    if (!window.supabaseClient) throw new Error("Supabase non initialisé");

                    const { data, error } = await window.supabaseClient
                        .from('saisons')
                        .select('*')
                        .eq('est_active', true)
                        .order('date_debut', { ascending: false })
                        .limit(1);

                    if (error) throw error;

                    if (data && data.length > 0) {
                        const s = data[0];
                        document.getElementById('current-season-name').textContent = s.nom;
                        document.getElementById('current-season-start').textContent = `Date de début: ${new Date(s.date_debut).toLocaleDateString('fr-FR')}`;
                        document.getElementById('current-season-end').textContent = `Date de fin: ${new Date(s.date_fin).toLocaleDateString('fr-FR')}`;
                    } else {
                        document.getElementById('current-season-name').textContent = "Aucune saison active";
                        document.getElementById('current-season-start').textContent = "-";
                        document.getElementById('current-season-end').textContent = "-";
                    }

                } catch (err) {
                    console.error("Erreur", err);
                    document.getElementById('current-season-name').textContent = "Erreur de chargement";
                }
            }

            // Load initially
            loadCurrentSeason();

            // Create Season
            document.getElementById('create-season-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('new-season-name').value;
                const start = document.getElementById('new-season-start').value;
                const end = document.getElementById('new-season-end').value;
                const msg = document.getElementById('season-msg');
                const btn = e.target.querySelector('button[type="submit"]');

                if (new Date(start) >= new Date(end)) {
                    msg.textContent = "La date de fin doit être après la date de début.";
                    msg.style.color = "#ff3333";
                    msg.style.display = "block";
                    return;
                }

                try {
                    btn.disabled = true;
                    btn.textContent = "CRÉATION EN COURS...";
                    msg.style.display = "none";

                    // End previous active seasons
                    await window.supabaseClient.from('saisons').update({ est_active: false }).eq('est_active', true);

                    // Insert new season
                    const { error } = await window.supabaseClient.from('saisons').insert([{
                        nom: name,
                        date_debut: start,
                        date_fin: end,
                        est_active: true
                    }]);

                    if (error) throw error;

                    msg.textContent = "Nouvelle saison lancée avec succès !";
                    msg.style.color = "#33ff33";
                    msg.style.display = "block";
                    document.getElementById('create-season-form').reset();
                    
                    // Reload UI
                    loadCurrentSeason();

                } catch (err) {
                    console.error("Erreur création saison", err);
                    msg.textContent = "Erreur lors de la création de la saison.";
                    msg.style.color = "#ff3333";
                    msg.style.display = "block";
                } finally {
                    btn.disabled = false;
                    btn.textContent = "LANCER NOUVELLE SAISON";
                }
            });

            // Reset season points logic
            const btnReset = document.getElementById('btn-reset-season');
            btnReset.addEventListener('click', async () => {
                if(confirm("ATTENTION : Cela va remettre à zéro les points, kills et grades de TOUS les joueurs ! Continuer ?")) {
                    if(confirm("Êtes-vous vraiment sûr ? Cette action est irréversible.")) {
                        try {
                            btnReset.textContent = "Réinitialisation...";
                            btnReset.disabled = true;

                            if (!window.supabaseClient) throw new Error("Supabase non initialisé");

                            const { error } = await window.supabaseClient.from('joueurs')
                                .update({
                                    points: '0',
                                    kills: '0',
                                    grade: 'Recrue'
                                })
                                .neq('id', '00000000-0000-0000-0000-000000000000'); // Update all rows (Supabase requires a filter for updates without eq, so neq a fake ID)

                            if (error) throw error;
                            
                            alert("Saison réinitialisée avec succès ! Les compteurs sont à zéro.");

                        } catch (err) {
                            console.error(err);
                            alert("Erreur lors de la réinitialisation.");
                        } finally {
                            btnReset.textContent = "Réinitialiser Points (Fin de Saison)";
                            btnReset.disabled = false;
                        }
                    }
                }
            });

            // --- Load All Seasons ---
            async function loadAllSeasons() {
                const tbody = document.getElementById('seasons-tbody');
                try {
                    const { data, error } = await window.supabaseClient
                        .from('saisons')
                        .select('*')
                        .order('date_debut', { ascending: false });

                    if (error) throw error;
                    
                    tbody.innerHTML = '';
                    if (!data || data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Aucune saison créée.</td></tr>';
                        return;
                    }

                    data.forEach(s => {
                        const tr = document.createElement('tr');
                        const statusColor = s.est_active ? '#33ff33' : '#666';
                        const statusText = s.est_active ? 'Active' : 'Terminée';
                        
                        tr.innerHTML = `
                            <td><strong style="color: #fff;">${s.nom}</strong></td>
                            <td>${new Date(s.date_debut).toLocaleDateString('fr-FR')}</td>
                            <td>${new Date(s.date_fin).toLocaleDateString('fr-FR')}</td>
                            <td style="color: ${statusColor}; font-weight: bold;">${statusText}</td>
                            <td>
                                ${!s.est_active ? `<button class="btn-action btn-success btn-activate" data-id="${s.id}" title="Rendre cette saison active">Activer</button>` : ''}
                                <button class="btn-action btn-warning btn-edit" data-id="${s.id}" data-nom="${s.nom}" data-start="${s.date_debut}" data-end="${s.date_fin}" title="Modifier">✏️</button>
                                <button class="btn-action btn-danger btn-delete" data-id="${s.id}" title="Supprimer">🗑️</button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });

                    attachActions();

                } catch (err) {
                    console.error('Failed to load all seasons:', err);
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Erreur de chargement des saisons.</td></tr>';
                }
            }

            loadAllSeasons();

            function attachActions() {
                // Delete
                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.getAttribute('data-id');
                        if (confirm("Voulez-vous vraiment supprimer cette saison ? Cela impactera les matchs qui y sont liés (ils n'auront plus de saison attribuée).")) {
                            await window.supabaseClient.from('saisons').delete().eq('id', id);
                            loadCurrentSeason();
                            loadAllSeasons();
                        }
                    });
                });

                // Activate
                document.querySelectorAll('.btn-activate').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.getAttribute('data-id');
                        if (confirm("Voulez-vous définir cette saison comme la saison active ? Cela terminera l'autre saison en cours.")) {
                            // Deactivate all
                            await window.supabaseClient.from('saisons').update({ est_active: false }).eq('est_active', true);
                            // Activate target
                            await window.supabaseClient.from('saisons').update({ est_active: true }).eq('id', id);
                            
                            loadCurrentSeason();
                            loadAllSeasons();
                        }
                    });
                });

                // Edit Logic (Simple prompt for ease of use without complex modals)
                document.querySelectorAll('.btn-edit').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.target.getAttribute('data-id');
                        const oldNom = e.target.getAttribute('data-nom');
                        const oldStart = e.target.getAttribute('data-start');
                        const oldEnd = e.target.getAttribute('data-end');

                        const newNom = prompt("Nouveau nom de la saison :", oldNom);
                        if (newNom === null) return; // Cancelled
                        
                        const newStart = prompt("Nouvelle date de début (YYYY-MM-DD) :", oldStart);
                        if (newStart === null) return;
                        
                        const newEnd = prompt("Nouvelle date de fin (YYYY-MM-DD) :", oldEnd);
                        if (newEnd === null) return;

                        if (new Date(newStart) >= new Date(newEnd)) {
                            alert("La date de fin doit être après la date de début.");
                            return;
                        }

                        try {
                            const { error } = await window.supabaseClient.from('saisons').update({
                                nom: newNom,
                                date_debut: newStart,
                                date_fin: newEnd
                            }).eq('id', id);
                            
                            if (error) throw error;
                            
                            loadCurrentSeason();
                            loadAllSeasons();
                            
                        } catch(err) {
                            console.error(err);
                            alert("Erreur lors de la modification de la saison.");
                        }
                    });
                });
            }
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Saisons - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background-color: #111;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 250px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            color: var(--flame-orange);
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: var(--glow-orange);
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu a {
            display: block;
            padding: 15px 25px;
            color: #aaa;
            text-decoration: none;
            transition: 0.3s;
            border-left: 3px solid transparent;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(255, 115, 0, 0.1);
            color: #fff;
            border-left-color: var(--flame-orange);
        }

        .admin-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .admin-header h1 {
            font-size: 2rem;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <a href="index.html" class="sidebar-brand">🔥 ADMIN</a>
            <ul class="sidebar-menu">
                <li><a href="index.html">Ajouter un Match</a></li>
                <li><a href="joueurs.html">Gestion Joueurs</a></li>
                <li><a href="saisons.html" class="active">Gestion Saisons</a></li>
            </ul>
        </aside>

        <main class="admin-content">
            <div class="admin-header">
                <h1>Gestion des Saisons</h1>
            </div>

            <div class="card" style="max-width: 600px;">
                <h3 style="color: var(--flame-orange); margin-bottom: 20px;">Saison Actuelle</h3>
                <div
                    style="background: rgba(0,0,0,0.5); padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 30px;">
                    <p style="font-size: 1.2rem; margin-bottom: 10px;"><strong>Saison 1 - L'Éveil</strong></p>
                    <p style="color: #aaa;">Date de début: 16 Janvier 2026</p>
                    <p style="color: #aaa; margin-bottom: 20px;">Date de fin: 16 Mars 2026</p>

                    <button id="btn-reset-season" class="btn btn-outline"
                        style="border-color:#ff3333; color:#ff3333; width:100%;">Réinitialiser Points (Fin de
                        Saison)</button>
                </div>

                <h3 style="color: var(--flame-orange); margin-bottom: 20px;">Créer Nouvelle Saison</h3>
                <form>
                    <div class="form-group">
                        <label>Nom de la Saison</label>
                        <input type="text" class="form-control" placeholder="Ex: Saison 2 - Le Brasier">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>Date Début</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Date Fin</label>
                            <input type="date" class="form-control">
                        </div>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">LANCER SAISON</button>
                </form>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnReset = document.getElementById('btn-reset-season');
            btnReset.addEventListener('click', async () => {
                if (confirm("ATTENTION : Cela va remettre à zéro les points, kills et grades de TOUS les joueurs ! Continuer ?")) {
                    if (confirm("Êtes-vous vraiment sûr ? Cette action est irréversible.")) {
                        try {
                            btnReset.textContent = "Réinitialisation...";
                            btnReset.disabled = true;

                            if (!window.supabaseClient) throw new Error("Supabase non initialisé");

                            const { error } = await window.supabaseClient.from('joueurs')
                                .update({
                                    points: '0',
                                    kills: '0',
                                    record_kills: '0',
                                    record_points: '0',
                                    grade: 'Recrue'
                                })
                                .neq('id', '00000000-0000-0000-0000-000000000000'); // Update all rows (Supabase requires a filter for updates without eq, so neq a fake ID)

                            if (error) throw error;

                            alert("Saison réinitialisée avec succès ! Les compteurs sont à zéro.");

                        } catch (err) {
                            console.error(err);
                            alert("Erreur lors de la réinitialisation.");
                        } finally {
                            btnReset.textContent = "Réinitialiser Points (Fin de Saison)";
                            btnReset.disabled = false;
                        }
                    }
                }
            });
        });
    </script>
</body>

</html>

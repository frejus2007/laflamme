<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - La Flamme</title>
    <script>
        if (!localStorage.getItem('flamme_admin')) {
            window.location.href = 'login.html';
        }
    </script>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            background-color: #111;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 250px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            color: var(--flame-orange);
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: var(--glow-orange);
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu a {
            display: block;
            padding: 15px 25px;
            color: #aaa;
            text-decoration: none;
            transition: 0.3s;
            border-left: 3px solid transparent;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: rgba(255, 115, 0, 0.1);
            color: #fff;
            border-left-color: var(--flame-orange);
        }

        .admin-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .admin-header h1 {
            font-size: 2rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
        }

        /* Match Form */
        .admin-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            border-top: 3px solid var(--flame-orange);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .admin-card h2 {
            color: var(--flame-yellow);
            margin-bottom: 25px;
            font-size: 1.5rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .match-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .checkbox-group {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 10px;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #fff;
            font-weight: normal;
        }

        .mock-result {
            margin-top: 30px;
            padding: 15px;
            background: rgba(51, 255, 51, 0.1);
            border: 1px solid #33ff33;
            border-radius: 8px;
            color: #33ff33;
            display: none;
        }

        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
            }
            .admin-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 2px solid var(--flame-orange);
                padding: 10px 0;
            }
            .sidebar-menu {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }
            .sidebar-menu li {
                flex: 1 1 auto;
                min-width: 120px;
            }
            .sidebar-menu a {
                padding: 10px;
                text-align: center;
                border-left: none;
                border-bottom: 3px solid transparent;
            }
            .sidebar-menu a:hover,
            .sidebar-menu a.active {
                border-left: none;
                border-bottom-color: var(--flame-orange);
            }
            .admin-content {
                padding: 20px 10px;
            }
            .match-form-grid {
                grid-template-columns: 1fr;
            }
            .admin-header {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            .admin-card {
                padding: 15px;
            }
            .sidebar-brand {
                margin-bottom: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <a href="index.html" class="sidebar-brand">🔥 ADMIN</a>
            <ul class="sidebar-menu">
                <li><a href="index.html" class="active">Ajouter un Match</a></li>
                <li><a href="joueurs.html">Gestion Joueurs</a></li>
                <li><a href="saisons.html">Gestion Saisons</a></li>
                <li><a href="tournois.html">Gestion Tournois</a></li>
            </ul>
            <div style="margin-top: auto; padding: 20px;">
                <button onclick="logoutAdmin()" class="btn btn-outline"
                    style="width: 100%; border-color:#ff3333; color:#ff3333; background: transparent;">Déconnexion</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-content">
            <div class="admin-header">
                <h1>Saisie de Match</h1>
            </div>

            <div class="admin-card" style="max-width: 800px;">
                <h2>Ajouter un Nouveau Résultat</h2>
                <form id="add-match-form">
                    <div class="match-form-grid">

                        <!-- Mode du Match -->
                        <div class="form-group">
                            <label>Mode de Jeu</label>
                            <select id="match-mode" class="form-control" style="margin-bottom: 10px;" required>
                                <option value="" disabled selected>Choisir le mode</option>
                                <option value="MJ">Multijoueur (MJ)</option>
                                <option value="BR">Battle Royale (BR)</option>
                            </select>
                            
                            <div id="mj-team-group" style="display: none;">
                                <label><input type="radio" name="mj-team" value="win" checked> Gagnante</label>
                                <label><input type="radio" name="mj-team" value="loss"> Perdante</label>
                            </div>
                        </div>
                    </div>

                    <!-- Configuration BR (Visible only if BR is selected) -->
                    <div id="br-players-group" style="display: none; background: rgba(255,115,0,0.05); padding: 15px; border-radius: 8px; border: 1px dashed var(--flame-orange); margin-bottom: 20px;">
                        <div class="match-form-grid">
                            <div class="form-group">
                                <label>Format de Match (BR)</label>
                                <select id="br-match-type" class="form-control">
                                    <option value="Solo" selected>Solo (1 joueur / équipe)</option>
                                    <option value="Duo">Duo (2 joueurs / équipe)</option>
                                    <option value="Squad">Squad (Dépasse 2 joueurs, max 4)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Nombre de Slots (Équipes)</label>
                                <input type="number" id="br-slots" class="form-control" min="1" value="16">
                            </div>
                        </div>
                        <div class="form-group" style="margin-top: 15px;">
                            <label>Nombre Total de Joueurs (BR)</label>
                            <input type="number" id="br-total-players" class="form-control" min="1" value="64">
                            <small id="br-validation-msg" style="color: #ff3333; display: none; margin-top: 5px; font-weight: bold;"></small>
                        </div>
                    </div>

                    <div class="match-form-grid">
                        <div class="form-group">
                            <label>Joueur (Pseudo)</label>
                            <select id="match-player" class="form-control" required>
                                <option value="" disabled selected>Chargement des joueurs...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Spécialité Joueur</label>
                            <input type="text" id="match-player-spec" class="form-control" readonly
                                placeholder="Auto-détecté">
                        </div>
                    </div>

                    <div class="match-form-grid">
                        <div class="form-group">
                            <label>Rang (Place terminée)</label>
                            <input type="number" id="match-rank" class="form-control" min="1" required>
                        </div>
                        <div class="form-group">
                            <label>Nombre de Kills</label>
                            <input type="number" id="match-kills" class="form-control" min="0" required>
                        </div>
                    </div>

                    <!-- Bonus -->
                    <div class="form-group">
                        <label>Bonus Spécial</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" id="match-mvp"> MVP (+5 pts)</label>
                        </div>
                        <input type="number" id="match-admin-bonus" class="form-control"
                            placeholder="Bonus admin manuel (ex: 10)" style="margin-top: 10px;">
                    </div>


                    <div style="display: flex; gap: 15px; margin-top: 30px;">
                        <button type="button" id="btn-calculate" class="btn btn-outline"
                            style="flex: 1;">SIMULER CALCUL DES POINTS</button>

                        <button type="submit" class="btn"
                            style="flex: 1; background: #33aaff; box-shadow: 0 0 15px rgba(51,170,255,0.4);">VALIDER
                            ET AJOUTER</button>
                    </div>

                    <div id="simulation-result" class="mock-result">
                        Points du match : <strong id="calc-points-val">0</strong> points.<br>
                        <span style="font-size: 0.9rem; color:#aaa;" id="calc-details"></span>
                        <div style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed #444; color: var(--flame-yellow);">
                            <strong>Nouveau Total : <span id="calc-new-total">0</span> pts</strong> • 
                            Nouveau Grade : <span id="calc-new-grade">Sélectionnez un joueur</span>
                        </div>
                        <div id="sim-profile-link-container" style="margin-top: 10px; display: none;">
                            <a id="sim-profile-link" href="#" target="_blank" class="btn btn-outline btn-small" style="font-size: 0.8rem; padding: 4px 10px; text-decoration: none;">Voir son Profil</a>
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        function logoutAdmin() {
            localStorage.removeItem('flamme_admin');
            window.location.href = 'login.html';
        }
    </script>
    <script src="../js/supabase.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/admin.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournois - La Flamme 🔥</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #000;
        }

        .coming-soon-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            /* minus navbar approximately */
            text-align: center;
        }

        .coming-soon-title {
            font-size: 3rem;
            color: var(--flame-orange);
            text-shadow: var(--glow-orange);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .coming-soon-text {
            font-size: 1.2rem;
            color: #aaa;
            max-width: 600px;
            line-height: 1.6;
        }

        .fire-icon {
            font-size: 5rem;
            margin-bottom: 30px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                filter: drop-shadow(0 0 10px rgba(255, 115, 0, 0.4));
            }

            100% {
                transform: scale(1.1);
                filter: drop-shadow(0 0 30px rgba(255, 115, 0, 1));
            }
        }
    </style>
</head>

<body>
    <canvas id="embers-canvas"></canvas>

    <!-- Navigation -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">🔥 LA FLAMME</a>
        <div class="menu-toggle" id="mobile-menu"><span></span><span></span><span></span></div>
        <div class="nav-links">
            <a href="index.html">ACCUEIL</a>
            <a href="classement.html">CLASSEMENT</a>
            <a href="profil.html">PROFIL</a>
            <a href="regles.html">RÈGLES</a>
            <a href="tournois.html" class="active">TOURNOIS</a>
            <a href="connexion.html" class="btn btn-outline btn-small" style="margin-left: 20px;">CONNEXION</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 40px;">
        <h1 style="text-align: center; color: var(--flame-orange); text-shadow: var(--glow-orange); margin-bottom: 20px;"
            class="orbitron">TOURNOIS OFFICIELS</h1>
        <p style="text-align: center; color: #aaa; margin-bottom: 40px;">Participez aux tournois internes et affrontez
            d'autres clans !</p>

        <div id="tournois-container">
            <p style="text-align: center; color: #aaa;">Chargement des tournois en cours...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tournoisContainer = document.getElementById('tournois-container');

            try {
                if (!window.supabaseClient) throw new Error("Supabase non initialisé");

                const { data, error } = await window.supabaseClient
                    .from('tournois')
                    .select('*')
                    .order('date_tournoi', { ascending: false });

                if (error) throw error;

                tournoisContainer.innerHTML = '';

                if (!data || data.length === 0) {
                    tournoisContainer.innerHTML = '<p style="text-align: center; color: #aaa;">Aucun tournoi disponible pour le moment.</p>';
                    return;
                }

                data.forEach(tournoi => {
                    const statusColor = tournoi.statut === 'Ouvert' ? '#33ff33' : (tournoi.statut === 'Terminé' ? '#ff3333' : '#aaa');
                    const opacity = tournoi.statut === 'Terminé' ? '0.7' : '1';
                    const icon = tournoi.statut === 'Terminé' ? '❄️' : '🔥';
                    const titleColor = tournoi.statut === 'Terminé' ? '#aaa' : 'var(--flame-yellow)';
                    
                    const btnHtml = tournoi.statut === 'Ouvert' ? '<button class="btn" style="margin-top: 20px;" onclick="alert(\'Inscription via WhatsApp du Clan !\')">S\'INSCRIRE</button>' : '';

                    const div = document.createElement('div');
                    div.className = 'panel';
                    div.style.marginTop = '30px';
                    div.style.opacity = opacity;
                    div.innerHTML = `
                        <div class="panel-header">
                            <h3 class="panel-title" style="color: ${titleColor};">${icon} ${tournoi.nom}</h3>
                        </div>
                        <div style="padding: 20px;">
                            <p><strong>Mode :</strong> ${tournoi.mode}</p>
                            <p><strong>Date :</strong> ${new Date(tournoi.date_tournoi).toLocaleDateString('fr-FR')}</p>
                            ${tournoi.description ? `<p><strong>Description :</strong> ${tournoi.description}</p>` : ''}
                            ${tournoi.recompense ? `<p><strong>Récompense :</strong> ${tournoi.recompense}</p>` : ''}
                            <p style="margin-top: 15px; color: ${statusColor};">Statut : ${tournoi.statut}</p>
                            ${btnHtml}
                        </div>
                    `;
                    tournoisContainer.appendChild(div);
                });

            } catch (err) {
                console.error("Erreur de chargement des tournois:", err);
                tournoisContainer.innerHTML = '<p style="text-align: center; color: #ff3333;">Erreur lors du chargement des tournois.</p>';
            }
        });
    </script>
</body>

</html>
